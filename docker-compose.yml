version: "3"
services: 
  mongo:
    container_name: mongo-container
    image: mongo:3.6.12
    restart: always
    volumes: 
      - ./mongo:/data/db
    ports: 
      - "27017:27017"
  api:
    container_name: api-container
    image: node:12.16.3
    restart: always
    working_dir: /usr/src/clean-node-api
    command: bash -c "npm install --only=prod && npm start"
    volumes: 
      - ./dist/:/usr/src/clean-node-api/dist/
      - ./package.json:/usr/src/clean-node-api/package.json
    ports: 
      - "5050:5050"
    links: 
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/clean-node-api
      - PORT=5050